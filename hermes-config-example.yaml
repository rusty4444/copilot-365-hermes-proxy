# Hermes Agent Configuration Example
# Add to ~/.hermes/config.yaml or pass via CLI flags

providers:
  copilot365:
    name: Microsoft 365 Copilot
    base_url: http://127.0.0.1:8081/v1
    api_key: no-key-required       # Auth is handled by OAuth2 token, not API key
    default_model: copilot-chat
    transport: chat_completions

# Then use it:
#   hermes -z "prompt" -p copilot365
#   hermes chat -p copilot365

# As a fallback provider (example):
# fallback_providers:
# - provider: copilot365
#   base_url: http://127.0.0.1:8081/v1
#   model: copilot-chat
#   api_key: no-key-required
